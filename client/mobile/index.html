<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#141218" />
  <title>🥧 Vibe Cod'in Pie — 参与互动</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════
       Material 3 — Dark Theme Design Tokens
       Matching screen.html's token set exactly
       ═══════════════════════════════════════════════ */
    :root {
      --md-sys-color-primary:             #D0BCFF;
      --md-sys-color-on-primary:          #381E72;
      --md-sys-color-primary-container:   #4F378B;
      --md-sys-color-on-primary-container:#EADDFF;
      --md-sys-color-secondary:             #CCC2DC;
      --md-sys-color-on-secondary:          #332D41;
      --md-sys-color-secondary-container:   #4A4458;
      --md-sys-color-on-secondary-container:#E8DEF8;
      --md-sys-color-tertiary:             #EFB8C8;
      --md-sys-color-on-tertiary:          #492532;
      --md-sys-color-tertiary-container:   #633B48;
      --md-sys-color-on-tertiary-container:#FFD8E4;
      --md-sys-color-error:             #F2B8B5;
      --md-sys-color-on-error:          #601410;
      --md-sys-color-error-container:   #8C1D18;
      --md-sys-color-on-error-container:#F9DEDC;
      --md-sys-color-surface:             #141218;
      --md-sys-color-on-surface:          #E6E0E9;
      --md-sys-color-surface-variant:     #49454F;
      --md-sys-color-on-surface-variant:  #CAC4D0;
      --md-sys-color-surface-dim:           #141218;
      --md-sys-color-surface-bright:        #3B383E;
      --md-sys-color-surface-container-lowest: #0F0D13;
      --md-sys-color-surface-container-low:    #1D1B20;
      --md-sys-color-surface-container:        #211F26;
      --md-sys-color-surface-container-high:   #2B2930;
      --md-sys-color-surface-container-highest:#36343B;
      --md-sys-color-outline:         #938F99;
      --md-sys-color-outline-variant: #49454F;
      --md-sys-color-inverse-surface:    #E6E0E9;
      --md-sys-color-inverse-on-surface: #322F35;
      --md-sys-color-inverse-primary:    #6750A4;
      --md-sys-color-shadow:     #000000;
      --md-sys-color-scrim:      #000000;
      --md-sys-state-hover-opacity:   0.08;
      --md-sys-state-focus-opacity:   0.12;
      --md-sys-state-pressed-opacity: 0.12;
      --md-sys-typescale-display-font:   'Google Sans', 'Noto Sans SC', sans-serif;
      --md-sys-typescale-headline-font:  'Google Sans', 'Noto Sans SC', sans-serif;
      --md-sys-typescale-title-font:     'Google Sans Text', 'Noto Sans SC', sans-serif;
      --md-sys-typescale-body-font:      'Google Sans Text', 'Noto Sans SC', sans-serif;
      --md-sys-typescale-label-font:     'Google Sans Text', 'Noto Sans SC', sans-serif;
      --md-sys-shape-corner-none:        0px;
      --md-sys-shape-corner-extra-small: 4px;
      --md-sys-shape-corner-small:       8px;
      --md-sys-shape-corner-medium:      12px;
      --md-sys-shape-corner-large:       16px;
      --md-sys-shape-corner-extra-large: 28px;
      --md-sys-shape-corner-full:        9999px;
      --md-sys-elevation-1: 0 1px 3px 1px rgba(0,0,0,0.15), 0 1px 2px 0 rgba(0,0,0,0.3);
      --md-sys-elevation-2: 0 2px 6px 2px rgba(0,0,0,0.15), 0 1px 2px 0 rgba(0,0,0,0.3);
      --md-sys-elevation-3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px 0 rgba(0,0,0,0.3);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100vh; min-height: 100dvh;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-family: var(--md-sys-typescale-body-font);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded';
      font-weight: normal; font-style: normal; font-size: 24px;
      line-height: 1; letter-spacing: normal;
      text-transform: none; display: inline-block;
      white-space: nowrap; word-wrap: normal;
      direction: ltr; font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top App Bar (M3 Center-aligned Small) ─── */
    .top-app-bar {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      padding: 20px 16px 12px;
      background: var(--md-sys-color-surface);
      position: sticky; top: 0; z-index: 10;
    }
    .top-app-bar-title {
      font-family: var(--md-sys-typescale-title-font);
      font-size: 22px; font-weight: 400;
      color: var(--md-sys-color-on-surface);
      display: flex; align-items: center; gap: 8px;
    }
    .top-app-bar-title .material-symbols-rounded {
      font-size: 28px; color: var(--md-sys-color-primary);
    }
    .top-app-bar-subtitle {
      text-align: center; margin-top: 4px;
      font-family: var(--md-sys-typescale-body-font);
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }

    /* ── Main Content ────────────────── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      padding: 16px 20px 24px; gap: 20px;
    }

    /* ── Input Section ───────────────── */
    .input-section {
      display: flex; flex-direction: column; gap: 12px;
    }
    .input-supporting-text {
      font-family: var(--md-sys-typescale-body-font);
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);
      padding: 0 4px;
    }
    .input-supporting-text .material-symbols-rounded {
      font-size: 16px; vertical-align: -3px;
      color: var(--md-sys-color-primary);
    }

    /* ── M3 Outlined Text Field ──────── */
    .md-text-field {
      position: relative;
    }
    .md-text-field textarea {
      width: 100%; height: 100px; padding: 16px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: var(--md-sys-shape-corner-extra-small);
      background: transparent;
      color: var(--md-sys-color-on-surface);
      font-family: var(--md-sys-typescale-body-font);
      font-size: 16px; line-height: 1.5;
      resize: none; outline: none;
      caret-color: var(--md-sys-color-primary);
      transition: border-color 0.2s;
    }
    .md-text-field textarea::placeholder {
      color: var(--md-sys-color-on-surface-variant);
    }
    .md-text-field textarea:focus {
      border-color: var(--md-sys-color-primary);
      border-width: 2px;
      padding: 15px; /* compensate for 2px border */
    }
    .md-text-field .supporting-text {
      display: flex; justify-content: space-between;
      padding: 4px 16px 0;
      font-family: var(--md-sys-typescale-body-font);
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }

    /* ── M3 Filled Button ────────────── */
    .md-filled-btn {
      width: 100%; height: 56px;
      border: none;
      border-radius: var(--md-sys-shape-corner-full);
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      font-family: var(--md-sys-typescale-label-font);
      font-size: 16px; font-weight: 500; letter-spacing: 0.1px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: box-shadow 0.2s, opacity 0.15s;
      box-shadow: none;
    }
    .md-filled-btn:hover {
      box-shadow: var(--md-sys-elevation-1);
    }
    .md-filled-btn:active {
      box-shadow: none;
    }
    .md-filled-btn:disabled {
      background: rgba(230,224,233,0.12);
      color: rgba(230,224,233,0.38);
      cursor: not-allowed;
      box-shadow: none;
    }
    .md-filled-btn .material-symbols-rounded { font-size: 18px; }

    /* ── M3 Snackbar ─────────────────── */
    .md-snackbar {
      position: fixed; bottom: 24px; left: 16px; right: 16px;
      padding: 0 16px; min-height: 48px;
      background: var(--md-sys-color-inverse-surface);
      color: var(--md-sys-color-inverse-on-surface);
      border-radius: var(--md-sys-shape-corner-extra-small);
      font-family: var(--md-sys-typescale-body-font);
      font-size: 14px; font-weight: 400;
      display: flex; align-items: center;
      box-shadow: var(--md-sys-elevation-3);
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0, 0, 0, 1), opacity 0.3s;
      z-index: 100; pointer-events: none;
    }
    .md-snackbar.show {
      transform: translateY(0); opacity: 1;
    }
    .md-snackbar.error {
      background: var(--md-sys-color-error-container);
      color: var(--md-sys-color-on-error-container);
    }

    /* ── M3 Assist Chips (Suggestion Chips) ── */
    .chips-section {
      display: flex; flex-direction: column; gap: 10px;
    }
    .chips-section-title {
      font-family: var(--md-sys-typescale-label-font);
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
    }
    .chips-row {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .md-assist-chip {
      height: 32px; padding: 0 16px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: var(--md-sys-shape-corner-small);
      background: transparent;
      color: var(--md-sys-color-on-surface);
      font-family: var(--md-sys-typescale-label-font);
      font-size: 14px; font-weight: 500; letter-spacing: 0.1px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background 0.15s;
    }
    .md-assist-chip:hover {
      background: rgba(230,224,233, var(--md-sys-state-hover-opacity));
    }
    .md-assist-chip:active {
      background: rgba(230,224,233, var(--md-sys-state-pressed-opacity));
    }
    .md-assist-chip .material-symbols-rounded { font-size: 18px; }

    /* ── Status Bar ──────────────────── */
    .status-bar {
      display: flex; justify-content: center; align-items: center; gap: 12px;
      padding: 8px 0;
    }
    .status-indicator {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--md-sys-typescale-label-font);
      font-size: 12px; font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      padding: 0 12px; height: 32px;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--md-sys-shape-corner-small);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: var(--md-sys-shape-corner-full);
      background: var(--md-sys-color-tertiary);
    }
    .status-dot.disconnected { background: var(--md-sys-color-error); }

    /* ── Footer ──────────────────────── */
    .footer {
      text-align: center; padding: 16px;
      font-family: var(--md-sys-typescale-body-font);
      font-size: 12px;
      color: var(--md-sys-color-outline);
    }

    /* ── Spinner (M3-style in button) ── */
    .md-spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid transparent;
      border-top-color: currentColor;
      border-radius: var(--md-sys-shape-corner-full);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Slider Control UI ───────────── */
    #slider-section {
      display: none;
      flex-direction: column; gap: 16px;
      align-items: center;
      padding: 8px 0;
    }
    #slider-section.has-sliders {
      display: flex;
    }
    .section-divider {
      width: 100%;
      font-family: var(--md-sys-typescale-label-font);
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      padding: 8px 0 4px;
      border-top: 1px solid var(--md-sys-color-outline-variant);
    }
    .slider-card-container {
      width: 100%; overflow-x: auto;
      display: flex; scroll-snap-type: x mandatory;
      gap: 16px; padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .slider-card {
      flex: 0 0 100%; scroll-snap-align: center;
      background: var(--md-sys-color-surface-container);
      border-radius: var(--md-sys-shape-corner-large);
      padding: 24px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      box-shadow: var(--md-sys-elevation-1);
    }
    .slider-card.active-control {
      border: 2px solid var(--md-sys-color-primary);
      box-shadow: var(--md-sys-elevation-2);
    }
    .slider-name {
      font-family: var(--md-sys-typescale-title-font);
      font-size: 18px; color: var(--md-sys-color-on-surface);
    }
    .slider-value-display {
      font-family: monospace;
      font-size: 24px; color: var(--md-sys-color-primary);
    }
    .force-visualizer {
      width: 100%; height: 8px; position: relative;
      background: var(--md-sys-color-surface-variant);
      border-radius: 4px; overflow: hidden;
    }
    .force-center-mark {
      position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
      background: var(--md-sys-color-outline); transform: translateX(-50%);
    }
    .force-bar {
      position: absolute; top: 0; bottom: 0;
      background: var(--md-sys-color-primary);
      border-radius: 4px;
      transition: width 0.1s, left 0.1s;
    }
    .touch-control-area {
      width: 100%; height: 80px;
      border: 2px dashed var(--md-sys-color-outline-variant);
      border-radius: var(--md-sys-shape-corner-medium);
      display: flex; align-items: center; justify-content: center;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 14px;
      cursor: grab; user-select: none;
    }
    .control-hint {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--md-sys-typescale-body-font);
      font-size: 12px; color: var(--md-sys-color-on-surface-variant);
    }
    .no-sliders-msg {
      color: var(--md-sys-color-on-surface-variant);
      font-size: 14px; text-align: center; padding: 24px 0;
    }
  </style>
</head>
<body>
  <!-- Top App Bar -->
  <header class="top-app-bar">
    <div>
      <div class="top-app-bar-title">
        <span class="material-symbols-rounded">music_note</span>
        Vibe Cod'in Pie
      </div>
      <div class="top-app-bar-subtitle">GeekPie Pi Day 2026 · 用文字改变音乐</div>
    </div>
  </header>

  <main class="main">
    <!-- Input Section -->
    <section class="input-section">
      <div class="input-supporting-text">
        告诉 AI 你想要什么样的音乐
        <span class="material-symbols-rounded">auto_awesome</span>
      </div>
      <div class="md-text-field">
        <textarea
          id="prompt-input"
          placeholder="例如：加一些 lo-fi 鼓点、让贝斯更深沉…"
          maxlength="200"
        ></textarea>
        <div class="supporting-text">
          <span></span>
          <span><span id="char-count">0</span>/200</span>
        </div>
      </div>
      <button class="md-filled-btn" id="submit-btn">
        <span class="material-symbols-rounded">send</span>
        提交
      </button>
    </section>

    <!-- Suggestion Chips -->
    <section class="chips-section">
      <div class="chips-section-title">尝试构建 User Test Music 预设，点这些：</div>
      <div class="chips-row">
        <button class="md-assist-chip" data-prompt="添加闭镲(chh)">
          <span class="material-symbols-rounded">radio_button_checked</span> 闭镲 (chh)
        </button>
        <button class="md-assist-chip" data-prompt="添加开镲(ohh)">
          <span class="material-symbols-rounded">radio_button_unchecked</span> 开镲 (ohh)
        </button>
        <button class="md-assist-chip" data-prompt="添加贝斯(bass)">
          <span class="material-symbols-rounded">graphic_eq</span> 贝斯 (bass)
        </button>
        <button class="md-assist-chip" data-prompt="添加主旋律(lead)">
          <span class="material-symbols-rounded">music_note</span> 主旋律 (lead)
        </button>
        <button class="md-assist-chip" data-prompt="添加低音铺底(subpad)">
          <span class="material-symbols-rounded">waves</span> 低音铺底 (subpad)
        </button>
        <button class="md-assist-chip" data-prompt="添加氛围铺底(pad)">
          <span class="material-symbols-rounded">blur_on</span> 氛围铺底 (pad)
        </button>
        <button class="md-assist-chip" data-prompt="添加琶音(arp)">
          <span class="material-symbols-rounded">electric_bolt</span> 琶音 (arp)
        </button>
        <button class="md-assist-chip" data-prompt="让节奏加快一点">
          <span class="material-symbols-rounded">speed</span> 加速节奏
        </button>
      </div>
    </section>

    <!-- Slider Control Section -->
    <div id="slider-section">
      <div class="section-divider">🎚️ 实时控制</div>
      <div id="slider-cards" class="slider-card-container"></div>
      <div id="no-sliders" class="no-sliders-msg">
        当前没有可控制的滑块<br>请等待 Master 创建
      </div>
      <button id="gyro-toggle-btn" class="md-filled-btn" style="display:none; width:auto; padding:0 32px;">
        <span class="material-symbols-rounded">screen_rotation</span>
        启用体感控制
      </button>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-indicator">
        <span class="status-dot disconnected" id="ws-dot"></span>
        队列: <strong id="queue-num">0</strong> 条待处理
      </div>
    </div>
  </main>

  <footer class="footer">
    Powered by Strudel + DeepSeek · ShanghaiTech GeekPie
  </footer>

  <!-- Snackbar -->
  <div class="md-snackbar" id="snackbar"></div>

  <script>
    // ── Elements ─────────────────────────
    const input = document.getElementById('prompt-input');
    const submitBtn = document.getElementById('submit-btn');
    const snackbar = document.getElementById('snackbar');
    const charCount = document.getElementById('char-count');
    const queueNum = document.getElementById('queue-num');
    const wsDot = document.getElementById('ws-dot');
    const chips = document.querySelectorAll('.md-assist-chip');
    const sliderSection = document.getElementById('slider-section');
    const sliderCardsContainer = document.getElementById('slider-cards');
    const noSlidersMsg = document.getElementById('no-sliders');
    const gyroToggleBtn = document.getElementById('gyro-toggle-btn');

    // ── Session ──────────────────────────
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    let sessionId = localStorage.getItem('vcp-session');
    if (!sessionId) {
      // crypto.randomUUID() requires Secure Context (HTTPS/localhost).
      // Fall back for plain HTTP on LAN (e.g. http://10.x.x.x:3000).
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        sessionId = crypto.randomUUID();
      } else {
        sessionId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          var r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
      }
      localStorage.setItem('vcp-session', sessionId);
    }

    // ── WebSocket with exponential backoff ────────────────────────
    let ws = null;
    let cooldownTimer = null;
    let activeSliders = [];
    let currentControlId = null;
    let gyroEnabled = false;
    let lastControlSent = 0;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let heartbeatTimer = null;

    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      let wsHost;

      // If we are on Vite dev server (usually 5173), connect to backend port 3000 explicitly
      if (location.port === '5173') {
        wsHost = location.hostname + ':3000';
      } else {
        // Otherwise assume we are served by the backend (same origin)
        wsHost = location.host;
      }

      const wsUrl = `${protocol}//${wsHost}/ws?type=mobile&session=${sessionId}`;

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        wsDot.classList.remove('disconnected');
        reconnectAttempts = 0; // Reset backoff on successful connection
        console.log('Connected');

        // Start client-side heartbeat
        startHeartbeat();
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);

          // Handle ping from server
          if (msg.type === 'ping') {
            if (ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'pong' }));
            }
            return;
          }

          handleMessage(msg);
        } catch (err) {
          console.error(err);
        }
      };

      ws.onclose = () => {
        wsDot.classList.add('disconnected');
        stopHeartbeat();

        // Exponential backoff: 1s, 2s, 4s, 8s, max 30s
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;

        console.log(`Reconnecting in ${delay}ms (attempt ${reconnectAttempts})...`);

        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectWS, delay);
      };

      ws.onerror = () => {
        wsDot.classList.add('disconnected');
      };
    }

    function startHeartbeat() {
      stopHeartbeat();
      // Send ping every 25 seconds (before server's 30s timeout)
      heartbeatTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 25000);
    }

    function stopHeartbeat() {
      if (heartbeatTimer) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = null;
      }
    }

    function handleMessage(msg) {
      // Always reset loading state on response to submission (queued, error, rate_limited)
      if (['queued', 'error', 'rate_limited'].includes(msg.type)) {
        setLoading(false);
      }

      switch (msg.type) {
        case 'init':
          queueNum.textContent = msg.queueSize || 0;
          if (msg.sliders && msg.sliders.length > 0) {
            activeSliders = msg.sliders;
            updateSliders();
          }
          break;

        case 'queued':
          showSnackbar(`✅ 已提交！你在第 ${msg.position} 位`);
          break;

        case 'processing':
          showSnackbar(msg.message || '🤖 AI 正在生成...');
          break;

        case 'rate_limited':
          showSnackbar(`⏳ 请等待 ${msg.waitSeconds} 秒后再提交`);
          startCooldown(msg.waitSeconds);
          break;

        case 'prompt_applied':
          showSnackbar(msg.message || '🎵 你的修改已生效！');
          break;

        case 'generation_failed':
          showSnackbar(msg.message || '代码生成失败，请换个说法', true);
          break;

        case 'queue_update':
          queueNum.textContent = msg.queueSize || 0;
          break;

        case 'error':
          showSnackbar(msg.message, true);
          break;

        case 'available_sliders':
          activeSliders = msg.sliders || [];
          updateSliders();
          break;

        case 'slider_value_update':
          updateSliderValue(msg.id, msg.value);
          break;

        case 'force_info':
          updateForceInfo(msg.sliders);
          break;
      }
    }

    // ── Submit ───────────────────────────
    submitBtn.addEventListener('click', () => {
      const prompt = input.value.trim();
      if (!prompt) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        showSnackbar('未连接到服务器，请刷新页面', true);
        return;
      }

      ws.send(JSON.stringify({ type: 'submit_prompt', prompt }));
      
      // UX: Clear input immediately but show loading state
      input.value = '';
      charCount.textContent = '0';
      setLoading(true);
    });
    
    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<span class="md-spinner"></span> 提交中…`;
      } else {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span class="material-symbols-rounded">send</span> 提交';
      }
    }

    // ── Char counter ─────────────────────
    input.addEventListener('input', () => {
      charCount.textContent = input.value.length;
    });

    // ── Suggestion chips ─────────────────
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        input.value = chip.dataset.prompt;
        charCount.textContent = input.value.length;
        input.focus();
      });
    });

    // ── Slider Control ────────────────────
    function updateSliders() {
      cleanupSliders(); // Clean up old event listeners first
      sliderCardsContainer.innerHTML = '';
      if (!activeSliders.length) {
        sliderSection.classList.remove('has-sliders');
        noSlidersMsg.style.display = 'block';
        return;
      }
      sliderSection.classList.add('has-sliders');
      noSlidersMsg.style.display = 'none';

      activeSliders.forEach((s) => {
        const card = document.createElement('div');
        card.className = 'slider-card';
        card.dataset.id = s.id;

        card.innerHTML = `
          <div class="slider-name">${escapeHtml(s.name)}</div>
          <div class="slider-value-display">${parseFloat(s.value).toFixed(2)}</div>
          <div class="force-visualizer">
            <div class="force-center-mark"></div>
            <div class="force-bar" style="width: 0%; left: 50%;"></div>
          </div>
          <div class="touch-control-area">← 左右滑动控制 →</div>
          <div class="control-hint">
            <span class="material-symbols-rounded" style="font-size:16px">group</span>
            <span>左右倾斜手机来控制</span>
          </div>
        `;

        // Touch control on the touch area
        const touchArea = card.querySelector('.touch-control-area');
        let startX = 0;
        let isActive = false;

        const handleTouchStart = (e) => {
          isActive = true;
          startX = e.touches[0].clientX;
          currentControlId = s.id;
          focusSlider(s.id);
        };

        const handleTouchMove = (e) => {
          if (!isActive) return;
          e.preventDefault();
          const dx = e.touches[0].clientX - startX;
          const force = Math.max(-1, Math.min(1, dx / 100));
          updateForceVisuals(card, force);
          sendControlForce(force);
        };

        const handleTouchEnd = () => {
          if (!isActive) return;
          isActive = false;
          updateForceVisuals(card, 0);
          // Send stop_control immediately without throttling
          if (ws && ws.readyState === WebSocket.OPEN && currentControlId === s.id) {
            ws.send(JSON.stringify({
              type: 'stop_control',
              id: s.id
            }));
          }
        };

        touchArea.addEventListener('touchstart', handleTouchStart);
        touchArea.addEventListener('touchmove', handleTouchMove);
        touchArea.addEventListener('touchend', handleTouchEnd);
        touchArea.addEventListener('touchcancel', handleTouchEnd); // Handle when touch is interrupted

        // Mouse drag control (for desktop)
        let mouseDown = false;
        const handleMouseDown = (e) => {
          mouseDown = true;
          startX = e.clientX;
          currentControlId = s.id;
          focusSlider(s.id);
        };

        const handleMouseMove = (e) => {
          if (!mouseDown || currentControlId !== s.id) return;
          const dx = e.clientX - startX;
          const force = Math.max(-1, Math.min(1, dx / 100));
          updateForceVisuals(card, force);
          sendControlForce(force);
        };

        const handleMouseUp = () => {
          if (!mouseDown) return;
          if (currentControlId === s.id) {
            const activeCard = document.querySelector(`.slider-card[data-id="${CSS.escape(s.id)}"]`);
            if (activeCard) {
              updateForceVisuals(activeCard, 0);
            }
            // Send stop_control immediately without throttling
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({
                type: 'stop_control',
                id: s.id
              }));
            }
          }
          mouseDown = false;
        };

        touchArea.addEventListener('mousedown', handleMouseDown);
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);

        // Store cleanup function for this card
        card._cleanup = () => {
          touchArea.removeEventListener('touchstart', handleTouchStart);
          touchArea.removeEventListener('touchmove', handleTouchMove);
          touchArea.removeEventListener('touchend', handleTouchEnd);
          touchArea.removeEventListener('touchcancel', handleTouchEnd);
          touchArea.removeEventListener('mousedown', handleMouseDown);
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseup', handleMouseUp);
        };

        sliderCardsContainer.appendChild(card);
      });

      setupScrollObserver();
      checkGyroPermission();
      if (activeSliders.length > 0 && !currentControlId) {
        focusSlider(activeSliders[0].id);
      }
    }

    function cleanupSliders() {
      // Clean up old event listeners before re-rendering
      document.querySelectorAll('.slider-card').forEach(card => {
        if (card._cleanup) {
          card._cleanup();
        }
      });
    }

    function updateSliderValue(id, value) {
      // Update in-memory state so re-renders (from available_sliders) don't reset to stale values
      const slider = activeSliders.find(s => s.id === id);
      if (slider) slider.value = value;

      const card = document.querySelector(`.slider-card[data-id="${CSS.escape(id)}"]`);
      if (!card) return;
      const display = card.querySelector('.slider-value-display');
      if (display) display.textContent = parseFloat(value).toFixed(2);
    }

    function updateForceInfo(sliders) {
      if (!sliders) return;
      for (const s of sliders) {
        const card = document.querySelector(`.slider-card[data-id="${CSS.escape(s.id)}"]`);
        if (!card) continue;
        updateForceVisuals(card, s.netForce || 0);
        const hint = card.querySelector('.control-hint span:last-child');
        if (hint && s.participants > 0) {
          hint.textContent = `${s.participants} 人参与中`;
        } else if (hint) {
          hint.textContent = '左右倾斜手机来控制';
        }
      }
    }

    function updateForceVisuals(card, force) {
      const bar = card.querySelector('.force-bar');
      if (!bar) return;
      const pct = Math.abs(force) * 50;
      if (force >= 0) {
        bar.style.left = '50%';
        bar.style.width = pct + '%';
      } else {
        bar.style.left = (50 - pct) + '%';
        bar.style.width = pct + '%';
      }
    }

    function focusSlider(id) {
      currentControlId = id;
      document.querySelectorAll('.slider-card').forEach(c => {
        c.classList.toggle('active-control', c.dataset.id === id);
      });
    }

    function setupScrollObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            focusSlider(entry.target.dataset.id);
          }
        });
      }, { root: sliderCardsContainer, threshold: 0.6 });
      document.querySelectorAll('.slider-card').forEach(c => observer.observe(c));
    }

    function sendControlForce(force) {
      const now = Date.now();
      if (ws && ws.readyState === WebSocket.OPEN && currentControlId && now - lastControlSent > 50) {
        ws.send(JSON.stringify({
          type: 'control_slider',
          id: currentControlId,
          force: parseFloat(force.toFixed(3))
        }));
        lastControlSent = now;
      }
    }

    function stopControl() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop_control', all: true }));
      }
      currentControlId = null;
    }

    // ── Gyro Control ──────────────────────
    function checkGyroPermission() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        gyroToggleBtn.style.display = 'inline-flex';
        gyroToggleBtn.onclick = () => {
          if (gyroEnabled) {
            disableGyro();
          } else {
            DeviceOrientationEvent.requestPermission()
              .then(response => {
                if (response === 'granted') {
                  enableGyro();
                }
              })
              .catch(console.error);
          }
        };
      } else {
        gyroToggleBtn.style.display = 'inline-flex';
        gyroToggleBtn.onclick = () => {
          if (gyroEnabled) {
            disableGyro();
          } else {
            enableGyro();
          }
        };
      }
    }

    function enableGyro() {
      if (gyroEnabled) return;
      gyroEnabled = true;
      window.addEventListener('deviceorientation', handleOrientation);
      gyroToggleBtn.innerHTML = '<span class="material-symbols-rounded">screen_rotation</span> 关闭体感控制';
      gyroToggleBtn.style.background = 'var(--md-sys-color-tertiary-container)';
      gyroToggleBtn.style.color = 'var(--md-sys-color-on-tertiary-container)';
    }

    function disableGyro() {
      if (!gyroEnabled) return;
      gyroEnabled = false;
      window.removeEventListener('deviceorientation', handleOrientation);
      gyroToggleBtn.innerHTML = '<span class="material-symbols-rounded">screen_rotation</span> 启用体感控制';
      gyroToggleBtn.style.background = '';
      gyroToggleBtn.style.color = '';
      // Stop any active control
      stopControl();
    }

    let lastGyroForce = 0; // Track last gyro force to detect zero crossings

    function handleOrientation(event) {
      if (!currentControlId) return;
      let gamma = event.gamma;
      if (gamma > 90) gamma = 90;
      if (gamma < -90) gamma = -90;
      if (Math.abs(gamma) < 5) gamma = 0;
      else gamma = gamma - (Math.sign(gamma) * 5);
      let force = gamma / 30;
      force = Math.max(-1, Math.min(1, force));
      const card = document.querySelector(`.slider-card[data-id="${CSS.escape(currentControlId)}"]`);
      if (card) {
        updateForceVisuals(card, force);

        // If force is zero and we had a non-zero force before, send stop_control
        if (Math.abs(force) < 0.01 && Math.abs(lastGyroForce) >= 0.01) {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'stop_control',
              id: currentControlId
            }));
          }
        } else if (Math.abs(force) >= 0.01) {
          // Only send non-zero forces through the throttled function
          sendControlForce(force);
        }

        lastGyroForce = force;
      }
    }

    // Stop control when page hidden
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopControl();
    });

    // ── Snackbar (M3) ────────────────────
    let snackbarTimeout = null;
    function showSnackbar(text, isError) {
      clearTimeout(snackbarTimeout);
      snackbar.textContent = text;
      snackbar.className = 'md-snackbar show' + (isError ? ' error' : '');
      snackbarTimeout = setTimeout(() => {
        snackbar.className = 'md-snackbar';
      }, 4000);
    }

    // ── Cooldown ─────────────────────────
    function startCooldown(seconds) {
      submitBtn.disabled = true;
      let remaining = seconds;
      submitBtn.innerHTML = `<span class="md-spinner"></span> 等待 ${remaining}s`;

      clearInterval(cooldownTimer);
      cooldownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(cooldownTimer);
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span class="material-symbols-rounded">send</span> 提交';
        } else {
          submitBtn.innerHTML = `<span class="md-spinner"></span> 等待 ${remaining}s`;
        }
      }, 1000);
    }

    // ── Init ─────────────────────────────
    connectWS();
  </script>
</body>
</html>
